name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          cd web/frontend
          corepack enable
          yarn config set registry https://registry.npmjs.org/
          yarn install --ignore-engines

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://yi-jing-divination-4h6y.onrender.com
        run: |
          cd web/frontend
          yarn build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 1485a5e1d9b5c3b8ac80b5235a56bdfb
          projectName: yi-jing-divination
          directory: web/frontend/out
          gitHubToken: ""
          skipDupDeployments: true

      - name: Deploy OAuth Callback Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 1485a5e1d9b5c3b8ac80b5235a56bdfb
        run: |
          cd workers/auth-callback
          npm install -g wrangler
          wrangler deploy --env production
